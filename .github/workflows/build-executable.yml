name: Build Executable

on:
  workflow_call:
    inputs:
      executable_kind:
        required: true
        type: string
        description: "client | server"

jobs:
  build:
    runs-on: windows-latest
    steps:

      - uses: actions/checkout@v4
        with:
          submodules: "recursive"

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          architecture: 'x64'

      - uses: Nuitka/Nuitka-Action@main
        with:
          nuitka-version: main
          script-name: GhostBot/run_${{ inputs.executable_kind }}.py
          mode: app

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: {{ inputs.executable_kind }}.exe
          path: build/run_${{ inputs.executable_kind }}.exe
          include-hidden-files: true
          archive: false

