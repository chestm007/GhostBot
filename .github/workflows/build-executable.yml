name: Build Executable

on:
  workflow_dispatch:
    inputs:
      executable_kind:
        required: true
        type: string
        description: "client | server"
  workflow_call:
    inputs:
      executable_kind:
        required: true
        type: string
        description: "client | server"

jobs:
  build:
    runs-on: windows-latest
    steps:

      - uses: actions/checkout@v4
        with:
          submodules: "recursive"

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          architecture: 'x64'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install .

      - name: compile ${{ inputs.executable_kind }} with nuitka
        uses: Nuitka/Nuitka-Action@main
        with:
          nuitka-version: main
          script-name: src/GhostBot/run_${{ inputs.executable_kind }}.py
          mode: app

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.executable_kind }}.exe
          path: build/run_${{ inputs.executable_kind }}.exe
          include-hidden-files: true
          archive: false
