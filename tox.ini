[tox]
envlist =
    py{3.13, 3.12, 3.11}
    build-{client, server}

[testenv]
# run our tests, and setup the dependecy tree
passenv = GITHUB_*
pip_pre = true
extras = test
depends =
    # build the package after testing
    build-client: py{3.13, 3.12, 3.11}
    build-server: py{3.13, 3.12, 3.11}
commands = pytest tests

[testenv:build-client]
# build the wheel
allowlist_externals = nuitka
commands = python -m pip install build
           pip install .
           nuitka --mode=app --assume-yes-for-downloads --output-dir=build --script-name=src/GhostBot/run_client.py

[testenv:build-server]
# build the wheel
allowlist_externals = nuitka, rm
commands = python -m pip install build
           pip install .
           nuitka --mode=app --assume-yes-for-downloads --output-dir=build --script-name=src/GhostBot/run_server.py

[pytest]
pythonpath = ./src ./tests
log_file_level = DEBUG
log_file = pytest.log
log_file_date_format = %Y-%m-%d %H:%M:%S
log_file_format = %(asctime)s %(levelname)s %(message)s
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
timeout = 15